version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: medical_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
      - ./csv:/data/csv
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      

